backend:
  name: github
  repo: michaelkaffel/ocm-website
  branch: main
  base_url: https://owlchrysalismedicine.com
  auth_endpoint: /api/auth

publish_mode: editorial_workflow

media_folder: public/images/articles
public_folder: /images/articles

collections:
  - name: articles
    label: Articles
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "MMM DD, YYYY", time_format: false }
      - { label: Category, name: category, widget: string }
      - { label: Read Time, name: readTime, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Thumbnail, name: thumbnail, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }